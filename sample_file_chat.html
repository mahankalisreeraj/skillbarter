<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Chat UI Test</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        'primary-dark': '#2563eb',
                        surface: '#ffffff',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .card { background: white; border-radius: 0.75rem; border: 1px solid #e2e8f0; }
        .input { border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; outline: none; }
        .input:focus { border-color: #3b82f6; ring: 2px solid #3b82f644; }
        .btn-primary { background: #3b82f6; color: white; border-radius: 0.5rem; font-weight: 500; transition: all 0.2s; }
        .btn-primary:hover { background: #2563eb; }
    </style>
</head>
<body class="p-8 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md h-[600px] card flex flex-col shadow-xl overflow-hidden">
        <!-- Chat Header -->
        <div class="p-4 border-b flex items-center justify-between">
            <h3 className="font-semibold">Session Chat</h3>
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
        </div>

        <!-- Chat Messages -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
            <!-- Left Message (Other User) -->
            <div class="flex flex-col max-w-[85%] items-start">
                <div class="flex items-baseline gap-2 mb-1">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Alice</span>
                    <span class="text-[10px] text-slate-400">19:35</span>
                </div>
                <div class="px-3 py-2 rounded-2xl text-sm shadow-sm bg-white text-slate-700 rounded-tl-none border border-slate-100">
                    Hey! I prepared the project document for you.
                </div>
            </div>

            <!-- Left Message (File) -->
            <div class="flex flex-col max-w-[85%] items-start">
                <div class="flex items-baseline gap-2 mb-1">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Alice</span>
                    <span class="text-[10px] text-slate-400">19:36</span>
                </div>
                <div class="px-3 py-2 rounded-2xl text-sm shadow-sm bg-white text-slate-700 rounded-tl-none border border-slate-100 flex flex-col gap-1">
                    <div class="flex items-center gap-2 p-2 rounded-lg border bg-white border-slate-200 hover:border-primary/30 cursor-pointer transition-colors">
                        <span class="text-xl">📕</span>
                        <div class="flex flex-col min-w-0">
                            <span class="font-medium truncate">Project_Specs.pdf</span>
                            <span class="text-[10px] opacity-70">1.2 MB</span>
                        </div>
                        <span class="ml-2">📥</span>
                    </div>
                </div>
            </div>

            <!-- Right Message (Me) -->
            <div class="flex flex-col max-w-[85%] ml-auto items-end">
                <div class="flex items-baseline gap-2 mb-1">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">You</span>
                    <span class="text-[10px] text-slate-400">19:37</span>
                </div>
                <div class="px-3 py-2 rounded-2xl text-sm shadow-sm bg-primary text-white rounded-tr-none">
                    Awesome, let me check it out. I'll send you the diagram too.
                </div>
            </div>

            <!-- Right Message (File) -->
            <div class="flex flex-col max-w-[85%] ml-auto items-end">
                <div class="flex items-baseline gap-2 mb-1">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">You</span>
                    <span class="text-[10px] text-slate-400">19:38</span>
                </div>
                <div class="px-3 py-2 rounded-2xl text-sm shadow-sm bg-primary text-white rounded-tr-none flex flex-col gap-1">
                    <div class="flex items-center gap-2 p-2 rounded-lg border bg-white/10 border-white/20 hover:bg-white/20 cursor-pointer transition-colors">
                        <span class="text-xl">🖼️</span>
                        <div class="flex flex-col min-w-0">
                            <span class="font-medium truncate">Architecture.png</span>
                            <span class="text-[10px] opacity-70">450 KB</span>
                        </div>
                        <span class="ml-2">📥</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="p-3 border-t bg-white">
            <div class="flex gap-2">
                <button class="p-2 text-slate-500 hover:text-primary hover:bg-primary/5 rounded-lg transition-colors border" title="Attach file">
                    📎
                </button>
                <input type="text" placeholder="Type a message..." class="input flex-1 text-sm bg-slate-50" readonly value="Great job!">
                <button class="btn-primary px-4 py-2 text-sm shadow-md">
                    Send
                </button>
            </div>
        </div>
    </div>

</body>
</html>
